<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#378ADD">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Mis Finanzas</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: #f6f5f1; color: #1a1a1a; }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; min-height: 100dvh; position: relative; }
  header { color: #fff; padding: calc(20px + env(safe-area-inset-top)) 18px 56px; transition: background .2s; }
  .hdr-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .eyebrow { font-size: 13px; opacity: .85; font-weight: 500; letter-spacing: .3px; }
  .hdr-actions { display: flex; gap: 8px; }
  .icon-btn { background: rgba(255,255,255,.18); border: none; color: #fff; width: 34px; height: 34px; border-radius: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .icon-btn svg { width: 18px; height: 18px; }
  .profile-pill { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,.18); border: none; color: #fff; padding: 8px 14px; border-radius: 20px; font-size: 15px; font-weight: 500; cursor: pointer; max-width: 100%; }
  .profile-pill .pname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .profile-pill svg { width: 16px; height: 16px; flex-shrink: 0; }
  .shared-tag { font-size: 10px; background: rgba(255,255,255,.25); padding: 2px 6px; border-radius: 6px; flex-shrink: 0; }
  .bal-label { font-size: 12px; opacity: .85; margin-top: 16px; }
  .bal-amount { font-size: 32px; font-weight: 600; margin-top: 2px; }
  .body { padding: 0 14px; margin-top: -36px; }
  .stats { display: flex; gap: 10px; }
  .stat { flex: 1; background: #fff; border: 1px solid #ececec; border-radius: 14px; padding: 12px 14px; }
  .stat-label { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; }
  .stat-label svg { width: 16px; height: 16px; }
  .stat-val { font-size: 17px; font-weight: 600; margin-top: 4px; }
  .tabs { display: flex; gap: 6px; margin: 18px 0 12px; background: #eceae4; padding: 4px; border-radius: 12px; }
  .tab { flex: 1; padding: 9px; border-radius: 9px; border: none; background: transparent; color: #888; font-weight: 600; font-size: 14px; cursor: pointer; }
  .tab.active { background: #fff; color: #1a1a1a; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .toolbar { display: flex; align-items: center; justify-content: space-between; margin: 4px 4px 10px; }
  .toolbar select { border: 1px solid #ddd; border-radius: 8px; padding: 6px 10px; font-size: 14px; background: #fff; }
  .count { font-size: 13px; color: #888; }
  .list { padding-bottom: 96px; }
  .row { display: flex; align-items: center; gap: 12px; background: #fff; border: 1px solid #ececec; border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
  .row.clickable { cursor: pointer; }
  .ibox { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ibox svg { width: 18px; height: 18px; }
  .row-mid { flex: 1; min-width: 0; }
  .row-title { font-size: 14px; font-weight: 500; }
  .row-sub { font-size: 12px; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row-amt { font-size: 15px; font-weight: 600; white-space: nowrap; }
  .del-btn { background: none; border: none; color: #ccc; cursor: pointer; padding: 4px; display: flex; }
  .del-btn svg { width: 16px; height: 16px; }
  .rend-meta { display: flex; gap: 10px; margin-top: 4px; font-size: 11px; color: #888; }
  .rend-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: center; }
  .rend-right .lab { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: .3px; }
  .rend-right .v { font-size: 15px; font-weight: 600; }
  .empty { text-align: center; padding: 44px 20px; color: #999; }
  .empty svg { width: 36px; height: 36px; opacity: .4; }
  .empty p { margin-top: 12px; font-size: 14px; line-height: 1.5; }
  .green { color: #0F6E56; } .red { color: #993C1D; }
  .fab { position: fixed; bottom: calc(22px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: 58px; height: 58px; border-radius: 50%; color: #fff; border: none; box-shadow: 0 4px 16px rgba(0,0,0,.25); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 40; }
  .fab svg { width: 28px; height: 28px; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
  .sheet { background: #fff; width: 100%; max-width: 480px; border-radius: 20px 20px 0 0; padding: 20px 18px calc(28px + env(safe-area-inset-bottom)); max-height: 90vh; overflow-y: auto; animation: up .25s ease; }
  @keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .sheet-head h2 { font-size: 18px; font-weight: 600; }
  .close-btn { background: #f0f0f0; border: none; width: 32px; height: 32px; border-radius: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .close-btn svg { width: 18px; height: 18px; }
  .seg { display: flex; gap: 8px; margin-bottom: 16px; }
  .seg button { flex: 1; padding: 10px; border-radius: 10px; border: 1.5px solid #e0e0e0; background: #fff; color: #888; font-weight: 600; font-size: 14px; cursor: pointer; text-transform: capitalize; }
  .seg button.gasto.on { border-color: #D85A30; background: #FAECE7; color: #993C1D; }
  .seg button.ingreso.on { border-color: #1D9E75; background: #E1F5EE; color: #0F6E56; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: 500; }
  .field input, .field select { width: 100%; padding: 11px 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; background: #fff; font-family: inherit; }
  .check-row { display: flex; align-items: center; gap: 10px; padding: 12px; background: #f6f5f1; border-radius: 10px; margin-bottom: 14px; cursor: pointer; }
  .check-row input { width: 20px; height: 20px; }
  .check-row .ct { font-size: 14px; font-weight: 500; }
  .check-row .cs { font-size: 12px; color: #888; }
  .note { font-size: 13px; color: #888; margin-bottom: 16px; line-height: 1.5; }
  .primary { width: 100%; padding: 14px; border-radius: 12px; border: none; color: #fff; font-weight: 600; font-size: 15px; cursor: pointer; margin-top: 8px; }
  .primary:disabled { opacity: .5; }
  .card { background: #fff; border: 1px solid #ececec; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
  .line { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; }
  .line span:first-child { color: #666; } .line span:last-child { font-weight: 500; }
  .divider { height: 1px; background: #eee; margin: 10px 0; }
  .result { display: flex; justify-content: space-between; align-items: center; }
  .result .t { font-size: 14px; font-weight: 600; } .result .a { font-size: 20px; font-weight: 700; }
  .sec-head { display: flex; justify-content: space-between; align-items: center; margin: 0 4px 10px; }
  .sec-head .t { font-size: 14px; font-weight: 600; }
  .add-sm { display: flex; align-items: center; gap: 4px; background: #1a1a1a; color: #fff; border: none; padding: 7px 12px; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .add-sm svg { width: 15px; height: 15px; }
  .prof-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 12px; margin-bottom: 6px; background: #fff; border: 1px solid #ececec; cursor: pointer; }
  .prof-row.on { background: #f0f0ee; }
  .dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .prof-name { flex: 1; font-size: 15px; display: flex; align-items: center; gap: 8px; }
  .mini-tag { font-size: 10px; background: #e7e7e3; color: #777; padding: 2px 6px; border-radius: 6px; }
  .add-prof { display: flex; gap: 8px; }
  .add-prof input { flex: 1; padding: 11px 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
  .add-prof button { padding: 0 18px; border-radius: 10px; border: none; background: #1a1a1a; color: #fff; font-weight: 600; cursor: pointer; }
  .hint { font-size: 12px; color: #999; margin-top: 14px; line-height: 1.5; }
  .manage-link { background: none; border: none; color: #378ADD; font-size: 13px; font-weight: 600; cursor: pointer; padding: 4px; }
  /* Login */
  .auth-wrap { min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; justify-content: center; padding: 24px; max-width: 420px; margin: 0 auto; }
  .auth-logo { width: 56px; height: 56px; border-radius: 16px; background: #378ADD; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  .auth-logo svg { width: 30px; height: 30px; color: #fff; }
  .auth-wrap h1 { font-size: 26px; font-weight: 700; margin-bottom: 6px; }
  .auth-wrap .sub { font-size: 14px; color: #777; margin-bottom: 28px; line-height: 1.5; }
  .auth-err { background: #FAECE7; color: #993C1D; padding: 10px 12px; border-radius: 10px; font-size: 13px; margin-bottom: 14px; }
  .auth-ok { background: #E1F5EE; color: #0F6E56; padding: 10px 12px; border-radius: 10px; font-size: 13px; margin-bottom: 14px; }
  .auth-switch { text-align: center; margin-top: 18px; font-size: 14px; color: #777; }
  .auth-switch button { background: none; border: none; color: #378ADD; font-weight: 600; cursor: pointer; font-size: 14px; }
  .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; color: #888; }
  .badge-rt { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(255,255,255,.9); margin-top: 4px; }
  .badge-rt .pulse { width: 7px; height: 7px; border-radius: 50%; background: #6ee7b7; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.3;} }
</style>
</head>
<body>
<div id="app"><div class="loading">Cargando…</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }
</script>
</body>
</html>
